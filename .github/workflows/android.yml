name: Android build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same ref — most useful for PR pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-debug:
    name: Assemble debug + unit tests + lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Compile + assemble debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      # Exercises R8 minification and the signing path on every push so a
      # Proguard breakage surfaces here, not on publish day. The keystore is
      # a throwaway generated per run — real releases use the local one.
      - name: Build minified release (R8) with throwaway key
        run: |
          keytool -genkeypair -keystore ci-release.jks -storepass ci-throwaway -keypass ci-throwaway \
            -alias upload -keyalg RSA -keysize 2048 -validity 1 -dname "CN=CI throwaway, O=joeppli"
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: ci-release.jks
          STORE_PASSWORD: ci-throwaway
          KEY_PASSWORD: ci-throwaway

      - name: Android lint (debug)
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zueri-joeppli-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 7
