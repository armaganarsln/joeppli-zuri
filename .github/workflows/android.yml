name: Android build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same ref — most useful for PR pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-debug:
    name: Assemble debug + unit tests + lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Compile + assemble debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Android lint (debug)
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: zueri-joeppli-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 7
